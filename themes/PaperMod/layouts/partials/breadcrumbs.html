{{- if (.Param "ShowBreadCrumbs") -}}
<div class="breadcrumbs">
    <a href="{{ "" | absLangURL }}">{{ i18n "home" | default "Home" }}</a>
    {{- range .Ancestors.Reverse }}
    {{- if ne .Kind "home" }}
    {{- print "&nbsp;»&nbsp;" | safeHTML -}}<a href="{{ .Permalink }}">{{ .Name }}</a>
    {{- end }}
    {{- end -}}
</div>
{{- end -}}
